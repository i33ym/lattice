<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lattice - DAG Visualization</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
<style>
:root {
  --bg-base: var(--bg);
  --bg-surface: var(--surface);
  --bg-panel: var(--card);
  --accent-teal: var(--teal);
  --accent-amber: var(--amber);
  --accent-violet: var(--violet);
  --accent-red: var(--red);
  --accent-green: var(--green);
  --text-primary: var(--text);
  --text-muted: var(--muted);
  --text-dim: var(--dim);
  --font-ui: var(--sans);
  --font-mono: var(--mono);
}

body {
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* Top Bar */
.top-bar {
  height: 48px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 100;
  position: relative;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text-primary);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.3px;
  margin-right: 8px;
  flex-shrink: 0;
}

.logo svg { flex-shrink: 0; }

.top-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

.top-group {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.top-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 4px;
}

.top-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 5px 12px;
  border-radius: 6px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.top-btn:hover { background: var(--border); border-color: var(--border-light); }
.top-btn.active { background: rgba(0,229,204,0.12); border-color: var(--accent-teal); color: var(--accent-teal); }

.top-btn.primary {
  background: linear-gradient(135deg, var(--accent-teal), #00C4AE);
  border-color: transparent;
  color: #0A0A0F;
  font-weight: 600;
}
.top-btn.primary:hover { filter: brightness(1.1); }

.filter-btn {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.filter-btn:hover { transform: scale(1.3); }
.filter-btn.active { box-shadow: 0 0 0 2px var(--bg-base), 0 0 0 4px currentColor; }
.filter-btn.f-clean { background: var(--accent-teal); color: var(--accent-teal); }
.filter-btn.f-dirty { background: var(--accent-amber); color: var(--accent-amber); }
.filter-btn.f-computing { background: var(--accent-violet); color: var(--accent-violet); }
.filter-btn.f-failed { background: var(--accent-red); color: var(--accent-red); }

.search-input {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 5px 10px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  width: 160px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent-teal); }
.search-input::placeholder { color: var(--text-dim); }

.spacer { flex: 1; }

.zoom-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}
.zoom-btn {
  width: 28px; height: 28px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.zoom-btn:hover { background: var(--border); }

/* Main Layout */
.main-layout {
  display: flex;
  height: calc(100vh - 48px - 36px);
}

/* Left Sidebar */
.left-sidebar {
  width: 260px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  transition: width 0.3s;
}
.left-sidebar.collapsed { width: 0; overflow: hidden; }

.sidebar-header {
  padding: 14px 16px 10px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header span { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }

.table-group {
  margin-bottom: 4px;
}

.table-header {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.1s;
  gap: 8px;
}
.table-header:hover { background: rgba(255,255,255,0.03); }

.table-expand {
  font-size: 10px;
  color: var(--text-dim);
  transition: transform 0.2s;
  width: 12px;
  text-align: center;
}
.table-expand.open { transform: rotate(90deg); }

.table-icon {
  width: 18px; height: 18px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--accent-teal);
  flex-shrink: 0;
}

.table-name {
  font-size: 13px;
  font-weight: 500;
  flex: 1;
}

.table-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg-panel);
  padding: 1px 6px;
  border-radius: 4px;
}

.column-list {
  overflow: hidden;
  transition: max-height 0.25s ease;
}

.column-item {
  display: flex;
  align-items: center;
  padding: 5px 16px 5px 44px;
  gap: 8px;
  cursor: pointer;
  transition: background 0.1s;
  font-size: 12px;
}
.column-item:hover { background: rgba(255,255,255,0.03); }
.column-item.selected { background: rgba(0,229,204,0.06); }

.col-status {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.col-status.clean { background: var(--accent-teal); }
.col-status.dirty { background: var(--accent-amber); }
.col-status.computing { background: var(--accent-violet); }
.col-status.failed { background: var(--accent-red); }
.col-status.pending { background: var(--text-dim); }

.col-name {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-primary);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.col-type {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  flex-shrink: 0;
}

/* Canvas Area */
.canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-base);
}

canvas#dagCanvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Right Panel */
.right-panel {
  width: 300px;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  transition: width 0.3s;
}
.right-panel.collapsed { width: 0; overflow: hidden; }

.inspector-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
  line-height: 1.6;
}

.inspector-content { padding: 16px; }

.insp-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 16px;
}

.insp-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.insp-title {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}

.insp-subtitle {
  font-size: 11px;
  color: var(--text-muted);
}

.insp-section {
  margin-bottom: 14px;
}

.insp-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text-dim);
  margin-bottom: 8px;
  font-weight: 600;
}

.insp-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 12px;
}

.insp-row-label { color: var(--text-muted); }
.insp-row-value { font-family: var(--font-mono); font-size: 11px; }

.insp-dep-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.insp-dep {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 8px;
  background: var(--bg-panel);
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
}
.insp-dep:hover { border-color: var(--accent-teal); }

.stat-bar {
  display: flex;
  gap: 2px;
  height: 6px;
  border-radius: 3px;
  overflow: hidden;
  margin-top: 6px;
}
.stat-bar > div { border-radius: 3px; }

.sparkline-container {
  height: 40px;
  background: var(--bg-panel);
  border-radius: 6px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-top: 6px;
}

/* Bottom Bar */
.bottom-bar {
  height: 36px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  font-size: 11px;
  color: var(--text-muted);
  z-index: 100;
  position: relative;
}

.bottom-stat {
  display: flex;
  align-items: center;
  gap: 5px;
}
.bottom-stat .num {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-primary);
  font-weight: 500;
}

.badge {
  padding: 1px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
}
.badge-amber { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
.badge-green { background: rgba(16,185,129,0.15); color: var(--accent-green); }

.sim-progress {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sim-progress-bar {
  flex: 1;
  height: 4px;
  background: var(--bg-panel);
  border-radius: 2px;
  overflow: hidden;
  max-width: 200px;
}
.sim-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-teal), var(--accent-violet));
  border-radius: 2px;
  transition: width 0.3s;
}

/* Minimap */
.minimap {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 180px;
  height: 120px;
  background: rgba(18,18,26,0.85);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  backdrop-filter: blur(8px);
}
.minimap canvas { width: 100%; height: 100%; }

.minimap-viewport {
  position: absolute;
  border: 1.5px solid var(--accent-teal);
  background: rgba(0,229,204,0.06);
  border-radius: 2px;
  pointer-events: none;
}

/* Context Menu */
.context-menu {
  position: fixed;
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 4px;
  min-width: 180px;
  z-index: 1000;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none;
}
.context-menu.show { display: block; }

.ctx-item {
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 5px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.1s;
}
.ctx-item:hover { background: rgba(255,255,255,0.05); }
.ctx-icon { font-size: 13px; width: 18px; text-align: center; }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 8px; }

/* Timeline slider (during simulation) */
.timeline-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  display: none;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  z-index: 50;
}
.timeline-bar.show { display: flex; }

.timeline-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--bg-panel);
  border-radius: 2px;
  outline: none;
}
.timeline-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent-teal);
  cursor: pointer;
  box-shadow: 0 0 8px rgba(0,229,204,0.4);
}
.timeline-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  min-width: 80px;
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: var(--bg-panel);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 11px;
  pointer-events: none;
  z-index: 500;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  display: none;
  max-width: 260px;
}
.tooltip.show { display: block; }
.tooltip-title { font-family: var(--font-mono); font-weight: 600; margin-bottom: 3px; font-size: 12px; }
.tooltip-row { color: var(--text-muted); font-size: 10px; line-height: 1.5; }

/* Mobile */
@media (max-width: 900px) {
  .left-sidebar, .right-panel { display: none; }
  .minimap { width: 120px; height: 80px; }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
  <a href="index.html" class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5z" fill="none" stroke="#00E5CC" stroke-width="1.5"/>
      <path d="M2 17l10 5 10-5" fill="none" stroke="#00E5CC" stroke-width="1.5" opacity="0.5"/>
      <path d="M2 12l10 5 10-5" fill="none" stroke="#00E5CC" stroke-width="1.5" opacity="0.75"/>
    </svg>
    Lattice
  </a>

  <div class="top-divider"></div>

  <div class="top-group">
    <span class="top-label">Layout</span>
    <button class="top-btn active" data-layout="hierarchical">Hierarchical</button>
    <button class="top-btn" data-layout="force">Force</button>
    <button class="top-btn" data-layout="radial">Radial</button>
  </div>

  <div class="top-divider"></div>

  <div class="top-group">
    <span class="top-label">Filter</span>
    <div class="filter-btn f-clean active" data-filter="clean" title="Clean"></div>
    <div class="filter-btn f-dirty active" data-filter="dirty" title="Dirty"></div>
    <div class="filter-btn f-computing active" data-filter="computing" title="Computing"></div>
    <div class="filter-btn f-failed active" data-filter="failed" title="Failed"></div>
  </div>

  <div class="top-divider"></div>

  <input type="text" class="search-input" placeholder="Search columns..." id="searchInput">

  <div class="spacer"></div>

  <button class="top-btn primary" id="simulateBtn">Simulate</button>
  <button class="top-btn" id="resetBtn">Reset</button>

  <div class="top-divider"></div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">&minus;</button>
    <button class="zoom-btn" id="fitBtn" title="Fit to screen">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
  </div>
</div>

<!-- Main Layout -->
<div class="main-layout">
  <!-- Left Sidebar -->
  <div class="left-sidebar" id="leftSidebar"></div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvasArea">
    <canvas id="dagCanvas"></canvas>
    <div class="minimap" id="minimap">
      <canvas id="minimapCanvas"></canvas>
      <div class="minimap-viewport" id="minimapViewport"></div>
    </div>
    <div class="timeline-bar" id="timelineBar">
      <span class="timeline-label" id="timelineLabel">Step 0 / 0</span>
      <input type="range" class="timeline-slider" id="timelineSlider" min="0" max="0" value="0">
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel" id="rightPanel">
    <div class="inspector-empty" id="inspectorEmpty">
      Select a node to inspect its<br>properties and dependencies
    </div>
    <div class="inspector-content" id="inspectorContent" style="display:none"></div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="bottom-stat">Tables <span class="num" id="statTables">0</span></div>
  <div class="bottom-stat">Columns <span class="num" id="statColumns">0</span></div>
  <div class="bottom-stat">Edges <span class="num" id="statEdges">0</span></div>
  <div class="bottom-stat">Dirty <span class="badge badge-amber" id="statDirty">0</span></div>
  <div class="spacer"></div>
  <div class="bottom-stat" id="simStatus" style="display:none">
    <span>Computing...</span>
    <div class="sim-progress">
      <div class="sim-progress-bar"><div class="sim-progress-fill" id="simProgressFill" style="width:0%"></div></div>
      <span class="num" id="simProgressText">0%</span>
    </div>
  </div>
  <div class="bottom-stat">
    <span class="badge badge-green">No cycles detected</span>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="contextMenu">
  <div class="ctx-item" data-action="markDirty"><span class="ctx-icon">&#9679;</span> Mark Dirty</div>
  <div class="ctx-item" data-action="recompute"><span class="ctx-icon">&#9654;</span> Recompute</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" data-action="inspect"><span class="ctx-icon">&#128269;</span> Inspect</div>
  <div class="ctx-item" data-action="showDeps"><span class="ctx-icon">&#8593;</span> Show Dependencies</div>
  <div class="ctx-item" data-action="showDependents"><span class="ctx-icon">&#8595;</span> Show Dependents</div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tooltipTitle"></div>
  <div class="tooltip-row" id="tooltipBody"></div>
</div>

<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script>
// ===== DATA MODEL =====
const StatusClean = 'clean', StatusDirty = 'dirty', StatusComputing = 'computing', StatusFailed = 'failed', StatusPending = 'pending';

const StatusColors = {
  clean: '#00E5CC', dirty: '#F59E0B', computing: '#8B5CF6', failed: '#EF4444', pending: '#4A4A5E'
};

const TypeIcons = {
  AudioType: '\u266B', StringType: 'T', VectorType: '\u25C7', ListOf: '[ ]', QueryType: 'Q', ResultType: '\u21D2'
};

// Pre-loaded data
const tables = [
  {
    name: 'podcasts', rowCount: 1247,
    columns: [
      { name: 'audio', type: 'AudioType', icon: '\u266B', computed: false, udf: null, status: StatusClean, rows: { total: 1247, clean: 1247, dirty: 0, failed: 0 }, lastComputed: null, sparkline: [] },
      { name: 'transcript', type: 'StringType', icon: 'T', computed: true, udf: 'transcribeUDF', status: StatusClean, rows: { total: 1247, clean: 1200, dirty: 35, failed: 12 }, lastComputed: '2.3s ago', sparkline: [120,145,132,155,140,128,162,150,138,145] },
      { name: 'summary', type: 'StringType', icon: 'T', computed: true, udf: 'summarizeUDF', status: StatusClean, rows: { total: 1247, clean: 1180, dirty: 55, failed: 12 }, lastComputed: '4.1s ago', sparkline: [80,95,88,102,96,85,110,98,92,95] },
      { name: 'embedding', type: 'VectorType(384)', icon: '\u25C7', computed: true, udf: 'embedUDF', status: StatusClean, rows: { total: 1247, clean: 1170, dirty: 65, failed: 12 }, lastComputed: '5.8s ago', sparkline: [40,52,45,58,50,42,60,55,48,52] },
    ]
  },
  {
    name: 'articles', rowCount: 3891,
    columns: [

// Build edges: [sourceTableIdx, sourceColIdx, targetTableIdx, targetColIdx]
const edges = [
  [0, 0, 0, 1], // podcasts.audio -> podcasts.transcript
  [0, 1, 0, 2], // podcasts.transcript -> podcasts.summary
  [0, 2, 0, 3], // podcasts.summary -> podcasts.embedding
  [1, 0, 1, 1], // articles.url -> articles.content
  [1, 1, 1, 2], // articles.content -> articles.chunks
  [1, 2, 1, 3], // articles.chunks -> articles.embeddings
  [0, 3, 2, 1], // podcasts.embedding -> search_index.podcast_results
  [1, 3, 2, 2], // articles.embeddings -> search_index.article_results
];

// ===== NODE POSITIONS =====
// Each node: { table, col, x, y, w, h, tableIdx, colIdx, id }
let nodes = [];
let nodeMap = {}; // id -> node

function buildNodes() {
  nodes = [];
  nodeMap = {};
  for (let ti = 0; ti < tables.length; ti++) {
    for (let ci = 0; ci < tables[ti].columns.length; ci++) {
      const col = tables[ti].columns[ci];
      const id = tables[ti].name + '.' + col.name;
      // Count dependents for sizing
      let depCount = 0;
      for (const e of edges) {
        if (e[0] === ti && e[1] === ci) depCount++;
      }
      const node = {
        table: tables[ti].name, col: col.name, id,
        tableIdx: ti, colIdx: ci,
        x: 0, y: 0, w: 140 + depCount * 8, h: 44,
        vx: 0, vy: 0, depCount
      };
      nodes.push(node);
      nodeMap[id] = node;
    }
  }
}

function getCol(node) { return tables[node.tableIdx].columns[node.colIdx]; }

// ===== LAYOUTS =====
let currentLayout = 'hierarchical';

function layoutHierarchical() {
  // Topological layers
  const inDegree = {};
  const adj = {};
  for (const n of nodes) { inDegree[n.id] = 0; adj[n.id] = []; }
  for (const e of edges) {
    const src = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
    const tgt = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
    inDegree[tgt]++;
    adj[src].push(tgt);
  }

  const layers = [];
  const layerOf = {};
  const queue = nodes.filter(n => inDegree[n.id] === 0).map(n => n.id);
  for (const id of queue) layerOf[id] = 0;

  let head = 0;
  while (head < queue.length) {
    const id = queue[head++];
    for (const next of (adj[id] || [])) {
      layerOf[next] = Math.max(layerOf[next] || 0, layerOf[id] + 1);
      inDegree[next]--;
      if (inDegree[next] === 0) queue.push(next);
    }
  }

  // Group by layer
  const layerNodes = {};
  let maxLayer = 0;
  for (const n of nodes) {
    const l = layerOf[n.id] || 0;
    if (!layerNodes[l]) layerNodes[l] = [];
    layerNodes[l].push(n);
    maxLayer = Math.max(maxLayer, l);
  }

  const layerGap = 140;
  const nodeGap = 30;

  for (let l = 0; l <= maxLayer; l++) {
    const layer = layerNodes[l] || [];
    // Sort by table for grouping
    layer.sort((a, b) => a.tableIdx - b.tableIdx || a.colIdx - b.colIdx);
    const totalW = layer.reduce((s, n) => s + n.w + nodeGap, -nodeGap);
    let x = -totalW / 2;
    for (const n of layer) {
      n.x = x + n.w / 2;
      n.y = l * layerGap;
      x += n.w + nodeGap;
    }
  }
}

function layoutForce() {
  // Initialize positions from hierarchical
  layoutHierarchical();
  // Then run force simulation steps
  for (let iter = 0; iter < 200; iter++) {
    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        let dx = nodes[j].x - nodes[i].x;
        let dy = nodes[j].y - nodes[i].y;
        let d = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = 8000 / (d * d);
        let fx = dx / d * force;
        let fy = dy / d * force;
        nodes[i].vx -= fx; nodes[i].vy -= fy;
        nodes[j].vx += fx; nodes[j].vy += fy;
      }
    }
    // Attraction (edges)
    for (const e of edges) {
      const src = nodeMap[tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name];
      const tgt = nodeMap[tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name];
      let dx = tgt.x - src.x;
      let dy = tgt.y - src.y;
      let d = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = (d - 160) * 0.005;
      let fx = dx / d * force;
      let fy = dy / d * force;
      src.vx += fx; src.vy += fy;
      tgt.vx -= fx; tgt.vy -= fy;
    }
    // Apply
    for (const n of nodes) {
      n.vx *= 0.85; n.vy *= 0.85;
      n.x += n.vx; n.y += n.vy;
    }
  }
  for (const n of nodes) { n.vx = 0; n.vy = 0; }
}

function layoutRadial() {
  // Layered radial
  layoutHierarchical(); // Get layers first
  const cx = 0, cy = 0;
  const layerOf = {};
  // re-compute layers
  const inDeg = {};
  const adjR = {};
  for (const n of nodes) { inDeg[n.id] = 0; adjR[n.id] = []; }
  for (const e of edges) {
    const src = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
    const tgt = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
    inDeg[tgt]++;
    adjR[src].push(tgt);
  }
  const q = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id);
  for (const id of q) layerOf[id] = 0;
  let h = 0;
  while (h < q.length) {
    const id = q[h++];
    for (const next of (adjR[id] || [])) {
      layerOf[next] = Math.max(layerOf[next] || 0, layerOf[id] + 1);
      inDeg[next]--;
      if (inDeg[next] === 0) q.push(next);
    }
  }
  const layerNodes = {};
  let maxLayer = 0;
  for (const n of nodes) {
    const l = layerOf[n.id] || 0;
    if (!layerNodes[l]) layerNodes[l] = [];
    layerNodes[l].push(n);
    maxLayer = Math.max(maxLayer, l);
  }

  for (let l = 0; l <= maxLayer; l++) {
    const layer = layerNodes[l] || [];
    const r = 100 + l * 140;
    for (let i = 0; i < layer.length; i++) {
      const angle = (i / layer.length) * Math.PI * 2 - Math.PI / 2;
      layer[i].x = cx + Math.cos(angle) * r;
      layer[i].y = cy + Math.sin(angle) * r;
    }
  }
}

function applyLayout(type) {
  currentLayout = type;
  if (type === 'hierarchical') layoutHierarchical();
  else if (type === 'force') layoutForce();
  else if (type === 'radial') layoutRadial();
}

// ===== CANVAS RENDERING =====
const canvas = document.getElementById('dagCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let canvasW, canvasH;

// View transform
let view = { x: 0, y: 0, scale: 1 };
let targetView = { x: 0, y: 0, scale: 1 };

function resizeCanvas() {
  const area = document.getElementById('canvasArea');
  canvasW = area.clientWidth;
  canvasH = area.clientHeight;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// Particles for edge animation
let particles = []; // { edgeIdx, t, speed }

function spawnParticle(edgeIdx) {
  particles.push({ edgeIdx, t: 0, speed: 0.006 + Math.random() * 0.008 });
}

// Table cluster bounds
function getTableBounds(ti) {
  const tableNodes = nodes.filter(n => n.tableIdx === ti);
  if (!tableNodes.length) return null;
  const pad = 28;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of tableNodes) {
    minX = Math.min(minX, n.x - n.w / 2);
    maxX = Math.max(maxX, n.x + n.w / 2);
    minY = Math.min(minY, n.y - n.h / 2);
    maxY = Math.max(maxY, n.y + n.h / 2);
  }
  return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
}

// Hovered / selected
let hoveredNode = null;
let selectedNode = null;
let highlightedNodes = new Set();
let highlightedEdges = new Set();

// Animation time
let animTime = 0;
let lastFrameTime = 0;

function drawGrid() {
  const gridSize = 40;
  const ox = view.x % gridSize;
  const oy = view.y % gridSize;
  ctx.strokeStyle = 'rgba(42,42,62,0.3)';
  ctx.lineWidth = 0.5;
  for (let x = ox; x < canvasW; x += gridSize * view.scale) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvasH); ctx.stroke();
  }
  for (let y = oy; y < canvasH; y += gridSize * view.scale) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvasW, y); ctx.stroke();
  }
}

function worldToScreen(wx, wy) {
  return {
    x: wx * view.scale + view.x + canvasW / 2,
    y: wy * view.scale + view.y + canvasH / 2
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - view.x - canvasW / 2) / view.scale,
    y: (sy - view.y - canvasH / 2) / view.scale
  };
}

function getEdgeBezier(e) {
  const src = nodeMap[tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name];
  const tgt = nodeMap[tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name];
  const s = worldToScreen(src.x, src.y + src.h / 2);
  const t = worldToScreen(tgt.x, tgt.y - tgt.h / 2);
  const dy = (t.y - s.y);
  const cpOff = Math.max(Math.abs(dy) * 0.4, 30 * view.scale);
  return { sx: s.x, sy: s.y, cp1x: s.x, cp1y: s.y + cpOff, cp2x: t.x, cp2y: t.y - cpOff, tx: t.x, ty: t.y, src, tgt };
}

function drawEdges() {
  for (let i = 0; i < edges.length; i++) {
    const e = edges[i];
    const b = getEdgeBezier(e);
    const srcCol = getCol(b.src);
    const tgtCol = getCol(b.tgt);
    const isDirty = tgtCol.status === StatusDirty;
    const isHighlighted = highlightedEdges.has(i);

    ctx.beginPath();
    ctx.moveTo(b.sx, b.sy);
    ctx.bezierCurveTo(b.cp1x, b.cp1y, b.cp2x, b.cp2y, b.tx, b.ty);

    // Thickness based on row count
    const rowFactor = Math.min(tgtCol.rows.total / 2000, 1);
    const baseThick = 1.5 + rowFactor * 2;

    if (isDirty) {
      ctx.setLineDash([6, 4]);
    } else {
      ctx.setLineDash([]);
    }

    if (isHighlighted) {
      ctx.strokeStyle = StatusColors[tgtCol.status] || '#00E5CC';
      ctx.lineWidth = baseThick + 1;
      ctx.globalAlpha = 0.8;
    } else {
      ctx.strokeStyle = selectedNode ? 'rgba(42,42,62,0.4)' : 'rgba(60,60,80,0.5)';
      ctx.lineWidth = baseThick;
      ctx.globalAlpha = selectedNode ? 0.3 : 0.6;
    }

    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // Arrowhead
    const at = 0.98;
    const ax = bezierPoint(b.sx, b.cp1x, b.cp2x, b.tx, at);
    const ay = bezierPoint(b.sy, b.cp1y, b.cp2y, b.ty, at);
    const at2 = 0.96;
    const ax2 = bezierPoint(b.sx, b.cp1x, b.cp2x, b.tx, at2);
    const ay2 = bezierPoint(b.sy, b.cp1y, b.cp2y, b.ty, at2);
    const angle = Math.atan2(ay - ay2, ax - ax2);
    const arrowSize = 6 * view.scale;

    ctx.beginPath();
    ctx.moveTo(b.tx, b.ty);
    ctx.lineTo(b.tx - Math.cos(angle - 0.4) * arrowSize, b.ty - Math.sin(angle - 0.4) * arrowSize);
    ctx.lineTo(b.tx - Math.cos(angle + 0.4) * arrowSize, b.ty - Math.sin(angle + 0.4) * arrowSize);
    ctx.closePath();
    ctx.fillStyle = isHighlighted ? (StatusColors[tgtCol.status] || '#00E5CC') : (selectedNode ? 'rgba(42,42,62,0.5)' : 'rgba(60,60,80,0.6)');
    ctx.globalAlpha = isHighlighted ? 0.8 : (selectedNode ? 0.3 : 0.6);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function bezierPoint(p0, p1, p2, p3, t) {
  const mt = 1 - t;
  return mt*mt*mt*p0 + 3*mt*mt*t*p1 + 3*mt*t*t*p2 + t*t*t*p3;
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed;
    if (p.t >= 1) { particles.splice(i, 1); continue; }

    const e = edges[p.edgeIdx];
    const b = getEdgeBezier(e);
    const px = bezierPoint(b.sx, b.cp1x, b.cp2x, b.tx, p.t);
    const py = bezierPoint(b.sy, b.cp1y, b.cp2y, b.ty, p.t);

    const tgtCol = getCol(b.tgt);
    const color = StatusColors[tgtCol.status] || '#00E5CC';

    // Glow
    const r = 3 * view.scale;
    const grad = ctx.createRadialGradient(px, py, 0, px, py, r * 3);
    grad.addColorStop(0, color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Core dot
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px, py, r * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTableClusters() {
  for (let ti = 0; ti < tables.length; ti++) {
    const b = getTableBounds(ti);
    if (!b) continue;
    const s1 = worldToScreen(b.x, b.y);
    const s2 = worldToScreen(b.x + b.w, b.y + b.h);
    const sw = s2.x - s1.x, sh = s2.y - s1.y;

    ctx.fillStyle = 'rgba(26,26,46,0.25)';
    ctx.strokeStyle = 'rgba(42,42,62,0.5)';
    ctx.lineWidth = 1;
    const cr = 12 * view.scale;
    roundRect(ctx, s1.x, s1.y, sw, sh, cr);
    ctx.fill();
    ctx.stroke();

    // Table label
    ctx.fillStyle = 'rgba(107,107,128,0.6)';
    ctx.font = `${Math.max(10, 11 * view.scale)}px "DM Sans", sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(tables[ti].name, s1.x + 10 * view.scale, s1.y + 6 * view.scale);
  }
}

function drawNodes() {
  for (const node of nodes) {
    const col = getCol(node);

    // Filter check
    if (!activeFilters.has(col.status) && col.status !== StatusPending) continue;

    // Search filter
    if (searchQuery && !node.id.toLowerCase().includes(searchQuery)) continue;

    const s = worldToScreen(node.x - node.w / 2, node.y - node.h / 2);
    const sw = node.w * view.scale;
    const sh = node.h * view.scale;
    const isHovered = hoveredNode === node;
    const isSelected = selectedNode === node;
    const isHighlighted = highlightedNodes.has(node.id);
    const isDimmed = selectedNode && !isSelected && !isHighlighted;
    const statusColor = StatusColors[col.status] || '#4A4A5E';

    ctx.save();
    if (isDimmed) ctx.globalAlpha = 0.2;

    // Glow for computing nodes
    if (col.status === StatusComputing) {
      const pulse = 0.4 + Math.sin(animTime * 4) * 0.3;
      const grad = ctx.createRadialGradient(s.x + sw/2, s.y + sh/2, 0, s.x + sw/2, s.y + sh/2, sw * 0.8);
      grad.addColorStop(0, `rgba(139,92,246,${pulse * 0.25})`);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.fillRect(s.x - sw * 0.3, s.y - sh * 0.3, sw * 1.6, sh * 1.6);
    }

    // Node body
    const r = 8 * view.scale;
    ctx.fillStyle = isSelected ? 'rgba(26,26,46,0.95)' : (isHovered ? 'rgba(22,22,36,0.95)' : 'rgba(18,18,30,0.92)');
    ctx.strokeStyle = statusColor;
    ctx.lineWidth = isSelected ? 2.5 : (isHovered ? 2 : 1.5);
    roundRect(ctx, s.x, s.y, sw, sh, r);
    ctx.fill();
    ctx.stroke();

    // Dirty/computing pulse ring
    if (col.status === StatusDirty || col.status === StatusComputing) {
      const pulse = Math.sin(animTime * 3) * 0.3 + 0.3;
      ctx.strokeStyle = statusColor;
      ctx.globalAlpha = isDimmed ? 0.05 : pulse;
      ctx.lineWidth = 3;
      roundRect(ctx, s.x - 3, s.y - 3, sw + 6, sh + 6, r + 2);
      ctx.stroke();
      ctx.globalAlpha = isDimmed ? 0.2 : 1;
    }

    // Icon
    ctx.fillStyle = statusColor;
    ctx.font = `${Math.max(10, 13 * view.scale)}px "JetBrains Mono"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(col.icon || 'o', s.x + 16 * view.scale, s.y + sh / 2);

    // Column name
    ctx.fillStyle = '#E8E8ED';
    ctx.font = `500 ${Math.max(9, 11.5 * view.scale)}px "JetBrains Mono"`;
    ctx.textAlign = 'left';
    ctx.fillText(col.name, s.x + 28 * view.scale, s.y + sh / 2 - 1 * view.scale);

    // Type badge (if enough space)
    if (sw > 120) {
      ctx.fillStyle = 'rgba(107,107,128,0.5)';
      ctx.font = `${Math.max(7, 8.5 * view.scale)}px "JetBrains Mono"`;
      ctx.textAlign = 'right';
      ctx.fillText(col.type.replace('Type', '').substring(0, 10), s.x + sw - 8 * view.scale, s.y + sh / 2);
    }

    ctx.restore();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== MINIMAP =====
const minimapCanvas = document.getElementById('minimapCanvas');
const minimapCtx = minimapCanvas.getContext('2d');

function drawMinimap() {
  const mc = document.getElementById('minimap');
  const mw = mc.clientWidth, mh = mc.clientHeight;
  minimapCanvas.width = mw * dpr;
  minimapCanvas.height = mh * dpr;
  minimapCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  minimapCtx.clearRect(0, 0, mw, mh);

  // Compute world bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of nodes) {
    minX = Math.min(minX, n.x - n.w / 2);
    maxX = Math.max(maxX, n.x + n.w / 2);
    minY = Math.min(minY, n.y - n.h / 2);
    maxY = Math.max(maxY, n.y + n.h / 2);
  }
  const pad = 60;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const ww = maxX - minX, wh = maxY - minY;
  const s = Math.min(mw / ww, mh / wh);

  const ox = (mw - ww * s) / 2;
  const oy = (mh - wh * s) / 2;

  function mTrans(wx, wy) {
    return { x: (wx - minX) * s + ox, y: (wy - minY) * s + oy };
  }

  // Edges
  for (const e of edges) {
    const src = nodeMap[tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name];
    const tgt = nodeMap[tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name];
    const a = mTrans(src.x, src.y);
    const b = mTrans(tgt.x, tgt.y);
    minimapCtx.strokeStyle = 'rgba(60,60,80,0.5)';
    minimapCtx.lineWidth = 0.5;
    minimapCtx.beginPath();
    minimapCtx.moveTo(a.x, a.y);
    minimapCtx.lineTo(b.x, b.y);
    minimapCtx.stroke();
  }

  // Nodes
  for (const n of nodes) {
    const col = getCol(n);
    const p = mTrans(n.x, n.y);
    minimapCtx.fillStyle = StatusColors[col.status] || '#4A4A5E';
    minimapCtx.beginPath();
    minimapCtx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
    minimapCtx.fill();
  }

  // Viewport rectangle
  const tl = screenToWorld(0, 0);
  const br = screenToWorld(canvasW, canvasH);
  const v1 = mTrans(tl.x, tl.y);
  const v2 = mTrans(br.x, br.y);
  const vp = document.getElementById('minimapViewport');
  vp.style.left = Math.max(0, v1.x) + 'px';
  vp.style.top = Math.max(0, v1.y) + 'px';
  vp.style.width = Math.min(mw, v2.x - v1.x) + 'px';
  vp.style.height = Math.min(mh, v2.y - v1.y) + 'px';
}

// ===== MAIN RENDER LOOP =====
function render(ts) {
  const dt = (ts - lastFrameTime) / 1000;
  lastFrameTime = ts;
  animTime += dt;

  // Smooth view interpolation
  view.x += (targetView.x - view.x) * 0.12;
  view.y += (targetView.y - view.y) * 0.12;
  view.scale += (targetView.scale - view.scale) * 0.12;

  ctx.clearRect(0, 0, canvasW, canvasH);

  drawGrid();
  drawTableClusters();
  drawEdges();
  drawParticles();
  drawNodes();
  drawMinimap();

  requestAnimationFrame(render);
}

// ===== INTERACTION =====
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let dragViewStart = { x: 0, y: 0 };

function hitTest(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (w.x >= n.x - n.w/2 && w.x <= n.x + n.w/2 && w.y >= n.y - n.h/2 && w.y <= n.y + n.h/2) {
      return n;
    }
  }
  return null;
}

function updateHighlights() {
  highlightedNodes.clear();
  highlightedEdges.clear();
  if (!selectedNode) return;

  highlightedNodes.add(selectedNode.id);

  // Walk upstream
  function walkUp(nodeId) {
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const tgtId = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
      if (tgtId === nodeId) {
        const srcId = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
        highlightedEdges.add(i);
        if (!highlightedNodes.has(srcId)) {
          highlightedNodes.add(srcId);
          walkUp(srcId);
        }
      }
    }
  }

  // Walk downstream
  function walkDown(nodeId) {
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const srcId = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
      if (srcId === nodeId) {
        const tgtId = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
        highlightedEdges.add(i);
        if (!highlightedNodes.has(tgtId)) {
          highlightedNodes.add(tgtId);
          walkDown(tgtId);
        }
      }
    }
  }

  walkUp(selectedNode.id);
  walkDown(selectedNode.id);
}

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const hit = hitTest(sx, sy);

  if (e.button === 2) return; // context menu handled separately

  if (hit) {
    selectNode(hit);
  } else {
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    dragViewStart = { x: targetView.x, y: targetView.y };
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (isDragging) {
    targetView.x = dragViewStart.x + (e.clientX - dragStart.x);
    targetView.y = dragViewStart.y + (e.clientY - dragStart.y);
    return;
  }

  const hit = hitTest(sx, sy);
  hoveredNode = hit;
  canvas.style.cursor = hit ? 'pointer' : 'default';

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  if (hit && !selectedNode) {
    const col = getCol(hit);
    document.getElementById('tooltipTitle').textContent = hit.id;
    document.getElementById('tooltipBody').innerHTML =
      `Type: ${col.type}<br>` +
      (col.udf ? `UDF: ${col.udf}<br>` : '') +
      `Status: ${col.status}<br>` +
      `Rows: ${col.rows.total.toLocaleString()} (${col.rows.clean} clean, ${col.rows.dirty} dirty)` +
      (col.lastComputed ? `<br>Last computed: ${col.lastComputed}` : '');
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  hoveredNode = null;
  document.getElementById('tooltip').classList.remove('show');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.15, Math.min(5, targetView.scale * delta));
  // Zoom toward mouse
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left - canvasW / 2;
  const my = e.clientY - rect.top - canvasH / 2;
  targetView.x = mx - (mx - targetView.x) * (newScale / targetView.scale);
  targetView.y = my - (my - targetView.y) * (newScale / targetView.scale);
  targetView.scale = newScale;
}, { passive: false });

// Double-click to mark dirty
canvas.addEventListener('dblclick', e => {
  const rect = canvas.getBoundingClientRect();
  const hit = hitTest(e.clientX - rect.left, e.clientY - rect.top);
  if (hit) {
    markDirtyAndCascade(hit);
  }
});

// Context menu
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const hit = hitTest(e.clientX - rect.left, e.clientY - rect.top);
  const menu = document.getElementById('contextMenu');
  if (hit) {
    selectNode(hit);
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    menu.classList.add('show');
    menu._node = hit;
  } else {
    menu.classList.remove('show');
  }
});

document.addEventListener('click', () => {
  document.getElementById('contextMenu').classList.remove('show');
});

document.querySelectorAll('.ctx-item').forEach(item => {
  item.addEventListener('click', e => {
    e.stopPropagation();
    const action = item.dataset.action;
    const menu = document.getElementById('contextMenu');
    const node = menu._node;
    menu.classList.remove('show');
    if (!node) return;

    if (action === 'markDirty') markDirtyAndCascade(node);
    else if (action === 'recompute') recomputeFromNode(node);
    else if (action === 'inspect') selectNode(node);
    else if (action === 'showDeps') { selectNode(node); }
    else if (action === 'showDependents') { selectNode(node); }
  });
});

  // Upstream deps
  const upstream = [];
  for (const e of edges) {
    const tgtId = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
    if (tgtId === selectedNode.id) {
      upstream.push(tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name);
    }
  }

  // Downstream deps
  const downstream = [];
  for (const e of edges) {
    const srcId = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
    if (srcId === selectedNode.id) {
      downstream.push(tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name);
    }
  }

  const cleanPct = Math.round(col.rows.clean / col.rows.total * 100);
  const dirtyPct = Math.round(col.rows.dirty / col.rows.total * 100);
  const failedPct = Math.round(col.rows.failed / col.rows.total * 100);

  content.innerHTML = `
    <div class="insp-header">
      <div class="insp-icon" style="background:${statusColor}22;border:1px solid ${statusColor}44;color:${statusColor}">
        ${col.icon || 'o'}
      </div>
      <div>
        <div class="insp-title" style="color:${statusColor}">${col.name}</div>
        <div class="insp-subtitle">${selectedNode.table} &middot; ${col.type}</div>
      </div>
    </div>

    <div class="insp-section">
      <div class="insp-section-title">Properties</div>
      <div class="insp-row"><span class="insp-row-label">Status</span><span class="insp-row-value" style="color:${statusColor}">${col.status}</span></div>
      ${col.computed ? `<div class="insp-row"><span class="insp-row-label">UDF</span><span class="insp-row-value">${col.udf}</span></div>` : ''}
      ${col.lastComputed ? `<div class="insp-row"><span class="insp-row-label">Last Computed</span><span class="insp-row-value">${col.lastComputed}</span></div>` : ''}
      <div class="insp-row"><span class="insp-row-label">Computed</span><span class="insp-row-value">${col.computed ? 'Yes' : 'No (source)'}</span></div>
    </div>

    <div class="insp-section">
      <div class="insp-section-title">Row Statistics</div>
      <div class="insp-row"><span class="insp-row-label">Total</span><span class="insp-row-value">${col.rows.total.toLocaleString()}</span></div>
      <div class="insp-row"><span class="insp-row-label">Clean</span><span class="insp-row-value" style="color:#00E5CC">${col.rows.clean.toLocaleString()}</span></div>
      <div class="insp-row"><span class="insp-row-label">Dirty</span><span class="insp-row-value" style="color:#F59E0B">${col.rows.dirty.toLocaleString()}</span></div>
      <div class="insp-row"><span class="insp-row-label">Failed</span><span class="insp-row-value" style="color:#EF4444">${col.rows.failed.toLocaleString()}</span></div>
      <div class="stat-bar">
        <div style="width:${cleanPct}%;background:#00E5CC"></div>
        <div style="width:${dirtyPct}%;background:#F59E0B"></div>
        <div style="width:${failedPct}%;background:#EF4444"></div>
      </div>
    </div>

    ${upstream.length ? `
    <div class="insp-section">
      <div class="insp-section-title">Dependencies (${upstream.length})</div>
      <div class="insp-dep-list">
        ${upstream.map(d => `<div class="insp-dep" onclick="selectNodeById('${d}')">${d}</div>`).join('')}
      </div>
    </div>` : ''}

    ${downstream.length ? `
    <div class="insp-section">
      <div class="insp-section-title">Dependents (${downstream.length})</div>
      <div class="insp-dep-list">
        ${downstream.map(d => `<div class="insp-dep" onclick="selectNodeById('${d}')">${d}</div>`).join('')}
      </div>
    </div>` : ''}

    ${col.sparkline.length ? `
    <div class="insp-section">
      <div class="insp-section-title">Computation Times (ms)</div>
      <div class="sparkline-container">
        <canvas id="sparklineCanvas" width="268" height="40"></canvas>
      </div>
    </div>` : ''}
  `;

  // Draw sparkline
  if (col.sparkline.length) {
    requestAnimationFrame(() => {
      const sc = document.getElementById('sparklineCanvas');
      if (!sc) return;
      const sctx = sc.getContext('2d');
      const sw = sc.width, sh = sc.height;
      const data = col.sparkline;
      const max = Math.max(...data);
      const min = Math.min(...data);
      const range = max - min || 1;
      const pad = 4;

      sctx.clearRect(0, 0, sw, sh);

      // Fill
      const grad = sctx.createLinearGradient(0, 0, 0, sh);
      grad.addColorStop(0, statusColor + '33');
      grad.addColorStop(1, 'transparent');
      sctx.beginPath();
      sctx.moveTo(pad, sh);
      for (let i = 0; i < data.length; i++) {
        const x = pad + i / (data.length - 1) * (sw - pad * 2);
        const y = sh - pad - (data[i] - min) / range * (sh - pad * 2);
        sctx.lineTo(x, y);
      }
      sctx.lineTo(sw - pad, sh);
      sctx.closePath();
      sctx.fillStyle = grad;
      sctx.fill();

      // Line
      sctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = pad + i / (data.length - 1) * (sw - pad * 2);
        const y = sh - pad - (data[i] - min) / range * (sh - pad * 2);
        if (i === 0) sctx.moveTo(x, y); else sctx.lineTo(x, y);
      }
      sctx.strokeStyle = statusColor;
      sctx.lineWidth = 1.5;
      sctx.stroke();

      // Last point dot
      const lx = sw - pad;
      const ly = sh - pad - (data[data.length - 1] - min) / range * (sh - pad * 2);
      sctx.beginPath();
      sctx.arc(lx, ly, 3, 0, Math.PI * 2);
      sctx.fillStyle = statusColor;
      sctx.fill();
    });
  }
}

function fitToScreen() {
  if (!nodes.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const n of nodes) {
    minX = Math.min(minX, n.x - n.w / 2);
    maxX = Math.max(maxX, n.x + n.w / 2);
    minY = Math.min(minY, n.y - n.h / 2);
    maxY = Math.max(maxY, n.y + n.h / 2);
  }
  const pad = 80;
  const ww = maxX - minX + pad * 2;
  const wh = maxY - minY + pad * 2;
  const s = Math.min(canvasW / ww, canvasH / wh, 2);
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  targetView.scale = s;
  targetView.x = -cx * s;
  targetView.y = -cy * s;
}

// ===== DIRTY CASCADE =====
function markDirtyAndCascade(node) {
  const col = getCol(node);
  col.status = StatusDirty;

  // Walk downstream and mark dirty
  const queue = [node.id];
  const visited = new Set([node.id]);
  while (queue.length) {
    const id = queue.shift();
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const srcId = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
      if (srcId === id) {
        const tgtId = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
        if (!visited.has(tgtId)) {
          visited.add(tgtId);
          const n = nodeMap[tgtId];
          getCol(n).status = StatusDirty;
          queue.push(tgtId);
          // Spawn particles
          spawnParticle(i);
          setTimeout(() => spawnParticle(i), 200);
          setTimeout(() => spawnParticle(i), 400);
        }
      }
    }
  }

  updateStats();
  updateSidebarStatuses();
  if (selectedNode) updateInspector();
}

function recomputeFromNode(node) {
  // Topo order from this node downstream
  const order = [];
  const queue = [node.id];
  const visited = new Set([node.id]);
  while (queue.length) {
    const id = queue.shift();
    order.push(id);
    for (const e of edges) {
      const srcId = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
      if (srcId === id) {
        const tgtId = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
        if (!visited.has(tgtId)) {
          visited.add(tgtId);
          queue.push(tgtId);
        }
      }
    }
  }

  // Animate computation
  let step = 0;
  function tick() {
    if (step >= order.length) return;
    const n = nodeMap[order[step]];
    const col = getCol(n);
    col.status = StatusComputing;
    updateSidebarStatuses();

    // Spawn particles on outgoing edges
    for (let i = 0; i < edges.length; i++) {
      const e = edges[i];
      const srcId = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
      if (srcId === n.id) {
        for (let j = 0; j < 5; j++) setTimeout(() => spawnParticle(i), j * 80);
      }
    }

    setTimeout(() => {
      col.status = StatusClean;
      updateSidebarStatuses();
      if (selectedNode === n) updateInspector();
      updateStats();
      step++;
      tick();
    }, 600);
  }
  tick();
}

// ===== SIMULATION =====
let simRunning = false;

document.getElementById('simulateBtn').addEventListener('click', () => {
  if (simRunning) return;
  runSimulation();
});

document.getElementById('resetBtn').addEventListener('click', () => {

  particles = [];

function runSimulation() {
  simRunning = true;
  document.getElementById('simStatus').style.display = 'flex';
  const timelineBar = document.getElementById('timelineBar');
  const timelineSlider = document.getElementById('timelineSlider');
  const timelineLabel = document.getElementById('timelineLabel');

  // Step 1: Reset all to clean
  for (const t of tables) for (const c of t.columns) c.status = StatusClean;
  updateSidebarStatuses();
  updateStats();

  // Step 2: Mark some source cells dirty after a beat
  setTimeout(() => {
    // Mark sources dirty
    const sources = ['podcasts.audio', 'articles.url', 'search_index.query'];
    for (const id of sources) {
      const n = nodeMap[id];
      if (n) getCol(n).status = StatusDirty;
    }
    updateSidebarStatuses();
    updateStats();

    // Step 3: Cascade dirty downstream
    setTimeout(() => {
      // Mark all computed columns dirty
      for (const t of tables) {
        for (const c of t.columns) {
          if (c.computed) c.status = StatusDirty;
        }
      }
      updateSidebarStatuses();
      updateStats();

      // Spawn cascade particles
      for (let i = 0; i < edges.length; i++) {
        const delay = i * 150;
        setTimeout(() => {
          for (let j = 0; j < 4; j++) setTimeout(() => spawnParticle(i), j * 60);
        }, delay);
      }

      // Step 4: Compute in topological order
      setTimeout(() => {
        // Build topo order
        const inDeg = {};
        const adjSim = {};
        for (const n of nodes) { inDeg[n.id] = 0; adjSim[n.id] = []; }
        for (const e of edges) {
          const src = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
          const tgt = tables[e[2]].name + '.' + tables[e[2]].columns[e[3]].name;
          inDeg[tgt]++;
          adjSim[src].push(tgt);
        }
        const topoOrder = [];
        const q = [];
        for (const n of nodes) { if (inDeg[n.id] === 0) q.push(n.id); }
        let head = 0;
        while (head < q.length) {
          const id = q[head++];
          topoOrder.push(id);
          for (const next of adjSim[id]) {
            inDeg[next]--;
            if (inDeg[next] === 0) q.push(next);
          }
        }

        timelineBar.classList.add('show');
        timelineSlider.max = topoOrder.length - 1;
        timelineSlider.value = 0;

        let step = 0;
        const totalSteps = topoOrder.length;

        function simStep() {
          if (step >= totalSteps || !simRunning) {
            simRunning = false;
            document.getElementById('simStatus').style.display = 'none';
            setTimeout(() => { timelineBar.classList.remove('show'); }, 2000);
            return;
          }

          const id = topoOrder[step];
          const n = nodeMap[id];
          const col = getCol(n);

          // Mark computing
          col.status = StatusComputing;
          updateSidebarStatuses();

          // Update progress
          const pct = Math.round((step + 1) / totalSteps * 100);
          document.getElementById('simProgressFill').style.width = pct + '%';
          document.getElementById('simProgressText').textContent = pct + '%';
          timelineSlider.value = step;
          timelineLabel.textContent = `Step ${step + 1} / ${totalSteps}`;

          // Spawn particles on outgoing edges
          for (let i = 0; i < edges.length; i++) {
            const e = edges[i];
            const srcId = tables[e[0]].name + '.' + tables[e[0]].columns[e[1]].name;
            if (srcId === id) {
              for (let j = 0; j < 6; j++) setTimeout(() => spawnParticle(i), j * 50);
            }
          }

          // Mark clean after delay
          setTimeout(() => {
            col.status = StatusClean;
            updateSidebarStatuses();
            updateStats();
            if (selectedNode && selectedNode.id === id) updateInspector();
            step++;
            setTimeout(simStep, 200);
          }, 500);
        }

        simStep();
      }, 800);
    }, 600);
  }, 500);
}

// ===== STATS =====
function updateStats() {
  let totalCols = 0, dirtyCount = 0;
  for (const t of tables) {
    totalCols += t.columns.length;
    for (const c of t.columns) {
      if (c.status === StatusDirty) dirtyCount++;
    }
  }
  document.getElementById('statTables').textContent = tables.length;
  document.getElementById('statColumns').textContent = totalCols;
  document.getElementById('statEdges').textContent = edges.length;
  document.getElementById('statDirty').textContent = dirtyCount;
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    deselectNode();
    document.getElementById('contextMenu').classList.remove('show');
  }
  if (e.key === 'f' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    fitToScreen();
  }
});

// ===== RESIZE =====
window.addEventListener('resize', () => {
  dpr = window.devicePixelRatio || 1;
  resizeCanvas();
});

// ===== INIT =====
function init() {
  buildNodes();
  applyLayout('hierarchical');
  resizeCanvas();
  buildSidebar();
  updateStats();

  // Open all table groups
  for (let ti = 0; ti < tables.length; ti++) {
    const list = document.getElementById('colList' + ti);
    list.style.maxHeight = list.scrollHeight + 'px';
  }

  // Initial fit after a frame
  requestAnimationFrame(() => {
    fitToScreen();
    // Snap view immediately
    view.x = targetView.x;
    view.y = targetView.y;
    view.scale = targetView.scale;
    requestAnimationFrame(render);
  });
}

init();
</script>
</body>
